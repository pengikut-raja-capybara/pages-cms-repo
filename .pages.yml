media:
  input: public/assets/menu
  output: /assets/menu

content:
  - name: menu_kuliner
    label: "Warung Raja Capybara"
    type: collection
    folder: data/menu
    extension: json
    format: json
    view:
      fields: [image, name, price]
    fields:
      - { name: name, label: "Nama Menu", type: string, required: true }
      - { name: description, label: "Deskripsi", type: text }
      - { name: price, label: "Harga", type: string }
      - { name: image, label: "Foto", type: image }
      - name: category
        label: "Kategori"
        type: select
        options: ["Makanan", "Minuman", "Snack", "Paket"] # Pastikan pakai kurung siku []
      - { name: badge, label: "Badge", type: string }
      - { name: popular, label: "Populer?", type: boolean }